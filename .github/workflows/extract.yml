name: Extract Archive

on:
  push:
    branches: [main]

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reassemble and extract ZIP
        run: |
          cat xaxino.zip.part* > reassembled.zip
          unzip -o reassembled.zip -d extracted/

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add extracted/
          git commit -m "Auto-extract: source files updated"
          git push
